<!--
 1. 应用主页面结构：Toolbar、Tree Panel、Editor Panel、Modals、Status Bar
 2. 脚本与样式表的加载顺序控制
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Editor</title>
  <!-- <link rel="stylesheet" href="css/style.css" /> -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/utils.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tree.css" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

<!-- ───────── Skeleton / Loading ───────── -->
<div id="skeleton" class="skeleton-screen">
  <div class="sk-sidebar"></div>
  <div class="sk-editor"></div>
</div>

<!-- ───────── Main Layout ───────── -->
<div id="app" class="app hidden">

  <!-- Top Toolbar -->
  <header class="toolbar">
    <div class="toolbar-left">
      <span class="app-title">MarkDown Editor</span>
      <button id="btn-new-node" title="新建根节点 (Ctrl+1)">新节点</button>
      <button id="btn-add-child" title="添加子节点 (Ctrl+2)">添加子节点</button>
      <button id="btn-add-sibling" title="添加同级节点 (Ctrl+3)">添加同级节点</button>
      <button id="btn-delete-node" class="danger">删除节点</button>
      <button id="btn-full-preview">预览全篇</button>
      <button id="btn-import">导入</button>
      <div class="dropdown">
        <button id="btn-export-toggle">导出 ▾</button>
        <div class="dropdown-menu" id="export-menu">
          <button data-fmt="json">JSON</button>
          <button data-fmt="md">Markdown</button>
          <button data-fmt="yaml">YAML</button>
          <button data-fmt="xml">XML</button>
          <button data-fmt="word">Word (复制)</button>
          <button data-fmt="txt">TXT</button>
        </div>
      </div>
    </div>
    <div class="toolbar-right">
      <button id="btn-tutorial" title="查看新手教程">教程</button>
      <button id="btn-bg-upload" title="上传背景图">背景</button>
      <label class="opacity-label">
        透明度
        <input type="range" id="bg-opacity" min="0.1" max="1.0" step="0.05" value="0.85" />
      </label>
      <button id="btn-settings" title="设置">⚙</button>
      <button id="btn-search" title="搜索 (Ctrl+P)">🔍</button>
      <button id="btn-shortcuts" title="快捷键一览 (Ctrl+/)">⌨</button>
    </div>
  </header>

  <!-- Body: Tree + Divider + Editor -->
  <div class="body-wrap">

    <!-- Left: Tree Panel -->
    <aside id="tree-panel" class="tree-panel">
      <div id="tree-container"></div>
    </aside>

    <!-- Resize Divider -->
    <div id="divider" class="divider"></div>

    <!-- Right: Editor Panel -->
    <main id="editor-panel" class="editor-panel">

      <!-- Node Meta -->
      <div class="node-meta" id="node-meta">
        <input id="meta-label" type="text" placeholder="节点标签名" />
        <input id="meta-comment" type="text" placeholder="注释（可选）" />
      </div>

      <!-- Markdown Toolbar -->
      <div class="md-toolbar" id="md-toolbar">
        <button data-action="bold" title="粗体">B</button>
        <button data-action="italic" title="斜体">I</button>
        <button data-action="code" title="行内代码">`</button>
        <button data-action="codeblock" title="代码块">```</button>
        <button data-action="ul" title="无序列表">• 列表</button>
        <button data-action="ol" title="有序列表">1. 列表</button>
        <button data-action="table" title="插入表格">⊞ 表格</button>
        <button data-action="link" title="链接">🔗</button>
        <button data-action="image" title="图片">🖼</button>
        <button data-action="blockquote" title="引用块">&gt;</button>
        <button data-action="strike" title="删除线">~~</button>
        <button data-action="sup" title="上标">x²</button>
        <button data-action="sub" title="下标">H₂</button>
        <button data-action="hr" title="分割线">—</button>
      </div>

      <!-- Editor + Preview side by side -->
      <div class="editor-wrap">
        <textarea id="editor" placeholder="在此输入 Markdown 内容…" spellcheck="false"></textarea>
        <div class="editor-preview-divider"></div>
        <div id="preview" class="preview"></div>
      </div>

    </main>
  </div>

  <!-- Status Bar -->
  <footer class="status-bar" id="status-bar">
    <span id="stat-chars-total">总字符: 0</span>
    <span id="stat-chars-node">当前节点: 0</span>
    <span id="stat-tokens-total">总Token≈: 0</span>
    <span id="stat-tokens-node">当前Token≈: 0</span>
    <span id="stat-nodes">节点: 0</span>
    <span id="stat-storage" class="storage-info"></span>
    <span id="stat-msg" class="status-msg"></span>
  </footer>
</div>

<!-- ───────── Modals ───────── -->
<div id="modal-full-preview" class="modal hidden">
  <div class="modal-box" style="width:860px;max-width:95vw;max-height:90vh;">
    <h3>全篇预览</h3>
    <div id="full-preview-content" class="preview"
         style="flex:1;overflow-y:auto;background:rgba(0,0,0,0.15);
                border:1px solid var(--border);border-radius:var(--radius);
                padding:20px;min-height:300px;max-height:calc(90vh - 120px);">
    </div>
    <div class="modal-actions">
      <button id="full-preview-close" class="secondary">关闭</button>
    </div>
  </div>
</div>

<!-- Table Insert Dialog -->
<div id="modal-table" class="modal hidden">
  <div class="modal-box">
    <h3>插入表格</h3>
    <label>行数 <input type="number" id="tbl-rows" value="3" min="1" max="20" /></label>
    <label>列数 <input type="number" id="tbl-cols" value="3" min="1" max="10" /></label>
    <div class="modal-actions">
      <button id="tbl-confirm">插入</button>
      <button id="tbl-cancel" class="secondary">取消</button>
    </div>
  </div>
</div>

<!-- Search Panel -->
<div id="modal-search" class="modal hidden">
  <div class="modal-box wide">
    <h3>全文搜索</h3>
    <input type="text" id="search-input" placeholder="输入关键词…" />
    <div id="search-results"></div>
    <div class="modal-actions">
      <button id="search-close" class="secondary">关闭</button>
    </div>
  </div>
</div>

<!-- Shortcuts Panel -->
<div id="modal-shortcuts" class="modal hidden">
  <div class="modal-box">
    <h3>快捷键一览</h3>
    <table class="shortcuts-table">
      <tr><td>Ctrl+S</td><td>立即保存</td></tr>
      <tr><td>Ctrl+Z</td><td>撤销（编辑器内容 / 树结构）</td></tr>
      <tr><td>Ctrl+Shift+Z</td><td>重做（编辑器内容 / 树结构）</td></tr>
      <tr><td>Ctrl+P</td><td>搜索</td></tr>
      <tr><td>Ctrl+/</td><td>快捷键列表</td></tr>
      <tr><td>Ctrl+1</td><td>新建根节点</td></tr>
      <tr><td>Ctrl+2</td><td>添加子节点</td></tr>
      <tr><td>Ctrl+3</td><td>添加同级节点</td></tr>
      <tr><td>↑ ↓</td><td>树节点导航</td></tr>
      <tr><td>Tab</td><td>列表缩进</td></tr>
      <tr><td>Shift+Tab</td><td>列表反缩进</td></tr>
      <tr><td>Ins</td><td>新建根节点</td></tr>
      <tr><td>Delete</td><td>删除当前节点（非编辑区）</td></tr>
    </table>
    <div class="modal-actions">
      <button id="shortcuts-close" class="secondary">关闭</button>
    </div>
  </div>
</div>

<!-- Storage Cleanup Dialog -->
<div id="modal-cleanup" class="modal hidden">
  <div class="modal-box">
    <h3>存储清理</h3>
    <p id="cleanup-desc"></p>
    <div id="cleanup-preview"></div>
    <label>保留最新备份条数：<input type="number" id="cleanup-keep" value="5" min="1" max="50" /></label>
    <div class="modal-actions">
      <button id="cleanup-confirm">执行清理</button>
      <button id="cleanup-cancel" class="secondary">取消</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div id="modal-settings" class="modal hidden">
  <div class="modal-box">
    <h3>设置</h3>
    <button id="btn-clear-bg">清除背景图</button>
    <button id="btn-storage-cleanup">存储清理</button>
    <div class="modal-actions">
      <button id="settings-close" class="secondary">关闭</button>
    </div>
  </div>
</div>

<!-- Import File Input (hidden) -->
<input type="file" id="import-file" accept=".json,.md,.markdown" class="hidden" />
<input type="file" id="bg-file" accept="image/*" class="hidden" />

<!-- Scripts -->
<script src="js/zoom.js"></script>
<script src="js/storage.js"></script>
<script src="js/tree.js"></script>
<script src="js/editor.js"></script>
<script src="js/search.js"></script>
<script src="js/export.js"></script>
<script src="js/shortcuts.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/app.js"></script>
</body>
</html>
